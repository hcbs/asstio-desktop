#
# Self-contained Asstio macOS build workflow. Adapted from upstream's
# macos-craft-ci.yml + macos-build-and-test.yml, inlined into one workflow:
#   - single CRAFT_TARGET (macos-clang-arm64), no File Provider matrix
#   - no ctest/coverage/PR-comment steps (M1 builds; tests run upstream)
#   - collects the built .app into an artifact instead of stopping at build

name: Asstio macOS Build

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    name: Build Asstio Desktop (macOS arm64)
    timeout-minutes: 350
    runs-on: macos-15
    env:
      CRAFT_TARGET: macos-clang-arm64
      CRAFT_MASTER_LOCATION: ${{ github.workspace }}/CraftMaster
      CRAFT_MASTER_CONFIG: ${{ github.workspace }}/craftmaster.ini
      PYTHON_VERSION: "3.12"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Restore cached Craft directories
        id: cache-craft-restore
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ${{ env.CRAFT_MASTER_LOCATION }}
            ${{ github.workspace }}/craft-clone
            ${{ github.workspace }}/${{ env.CRAFT_TARGET }}
          key: ${{ runner.os }}-craft-${{ hashFiles(env.CRAFT_MASTER_CONFIG) }}

      - name: Select Xcode 16.3
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Homebrew dependencies
        run: |
          brew install homebrew/cask/inkscape

      - name: Download Craft
        if: steps.cache-craft-restore.outputs.cache-hit != 'true'
        run: |
          git clone -q --depth=1 https://invent.kde.org/packaging/craftmaster.git ${{ env.CRAFT_MASTER_LOCATION }}

      - name: Add required blueprint repositories
        if: steps.cache-craft-restore.outputs.cache-hit != 'true'
        run: |
          python "${{ env.CRAFT_MASTER_LOCATION }}/CraftMaster.py" --config "${{ env.CRAFT_MASTER_CONFIG }}" --target ${{ env.CRAFT_TARGET }} -c --add-blueprint-repository "https://github.com/nextcloud/craft-blueprints-kde.git|stable-33.0|"
          python "${{ env.CRAFT_MASTER_LOCATION }}/CraftMaster.py" --config "${{ env.CRAFT_MASTER_CONFIG }}" --target ${{ env.CRAFT_TARGET }} -c --add-blueprint-repository "https://github.com/nextcloud/desktop-client-blueprints.git|stable-33.0|"

      - name: Setup Craft
        if: steps.cache-craft-restore.outputs.cache-hit != 'true'
        run: |
          python "${{ env.CRAFT_MASTER_LOCATION }}/CraftMaster.py" --config "${{ env.CRAFT_MASTER_CONFIG }}" --target ${{ env.CRAFT_TARGET }} -c craft

      - name: Install Craft Nextcloud client dependencies
        if: steps.cache-craft-restore.outputs.cache-hit != 'true'
        run: |
          python "${{ env.CRAFT_MASTER_LOCATION }}/CraftMaster.py" --config "${{ env.CRAFT_MASTER_CONFIG }}" --target ${{ env.CRAFT_TARGET }} -c --install-deps nextcloud-client

      - name: Cache Craft directories
        if: steps.cache-craft-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ${{ env.CRAFT_MASTER_LOCATION }}
            ${{ github.workspace }}/craft-clone
            ${{ github.workspace }}/${{ env.CRAFT_TARGET }}
          key: ${{ runner.os }}-craft-${{ hashFiles(env.CRAFT_MASTER_CONFIG) }}

      - name: Build nextcloud-client
        run: |
          python "${{ env.CRAFT_MASTER_LOCATION }}/CraftMaster.py" --config "${{ env.CRAFT_MASTER_CONFIG }}" --target ${{ env.CRAFT_TARGET }} -c --options nextcloud-client.srcDir=${{ github.workspace }} --options nextcloud-client.buildFileProviderModule=False nextcloud-client

      - name: Collect app bundle
        run: |
          set -e
          TARGET_DIR="${{ github.workspace }}/${{ env.CRAFT_TARGET }}"
          echo "All .app bundles under craft target:"
          find "$TARGET_DIR" -maxdepth 12 -type d -iname "*.app" 2>/dev/null || true
          # Match on the bundle NAME (a path match hits unrelated bundles like
          # Python's IDLE.app because the workspace path contains "asstio").
          APP=$(find "$TARGET_DIR" -maxdepth 12 -type d \( -iname "asstio*.app" -o -iname "nextcloud*.app" \) 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "No Asstio/Nextcloud .app bundle found under $TARGET_DIR" >&2
            exit 1
          fi
          echo "Found: $APP"
          SIZE_MB=$(du -sm "$APP" | cut -f1)
          echo "Bundle size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -lt 50 ]; then
            echo "Bundle suspiciously small (<50 MB) — refusing to upload" >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP" Asstio-macos-arm64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Asstio-macos-arm64
          path: Asstio-macos-arm64.zip
          retention-days: 14
