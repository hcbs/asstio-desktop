  mask (single fill color, no gradients) at viewBox 0 0 128 128 — macOS treats
  this as an NSImage template and re-tints it to match the sidebar's selected/
  unselected state, so any color beyond flat black is discarded at render time.

  Shape: the Asstio icon-mark path (see branding/asstio-logo.svg / BRAND.md),
  scaled from its native 200x200 viewBox down to fit the 128x128 template
  canvas (scale factor 0.64 = 128/200) and filled flat black per the template
  convention above.
-->
