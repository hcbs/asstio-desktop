  Asstio Windows Start-menu tile.

  Upstream convention (Nextcloud-w10startmenu.svg): a full-color square tile —
  a filled circle/disc background nearly spanning the viewBox, with the white
  variant of the logo mark composited on top, occupying most of the disc.

  Background: solid brand purple #6D3EFF (see branding/BRAND.md / NEXTCLOUD.cmake
  NEXTCLOUD_BACKGROUND_COLOR), matching the wizard-header background used
  elsewhere so the same white mark reads correctly here too.
  Foreground: the Asstio white mark path, copied verbatim from
  branding/asstio-logo-white.svg (viewBox 0 0 200 200 — reused as-is here so
  the circle and path share one coordinate space).
-->
